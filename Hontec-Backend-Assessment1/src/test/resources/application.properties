spring.application.name=Hontec-Backend-Assessment-Test

# Database Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Flyway Migration Configuration (Disabled for simple tests)
spring.flyway.enabled=false

# Custom JWT Security Configuration
app.jwt.secret=dGhpcy1pcy1hLXNlY3VyZS1kZWZhdWx0LXNlY3JldC1rZXktZm9yLXBhaXItcHJvZ3JhbW1pbmc=
app.jwt.expiration-ms=86400000

# Custom SendGrid Configuration
app.sendgrid.api-key=SG.placeholder_api_key
