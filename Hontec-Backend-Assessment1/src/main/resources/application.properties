spring.application.name=Hontec-Backend-Assessment
server.port=${PORT:8080}

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
#spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Migration Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.out-of-order=false

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Swagger / OpenAPI Config
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Custom JWT Security Configuration
# Base64 encoded secret key (min 256 bits)
app.jwt.secret=dGhpcy1pcy1hLXNlY3VyZS1kZWZhdWx0LXNlY3JldC1rZXktZm9yLXBhaXItcHJvZ3JhbW1pbmc=
# Token validity: 24 hours (in milliseconds)
app.jwt.expiration-ms=86400000

# Custom SendGrid Configuration
app.sendgrid.api-key=${SENDGRID_API_KEY:SG.placeholder_api_key}
app.sendgrid.from-email=no-reply@pharmacy.com
app.manager.email=manager@pharmacy.com
